# Tag format: v1.2.3
# Push: git tag v1.2.3 && git push origin v1.2.3

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  NUITKA_ASSUME_YES_FOR_DOWNLOADS: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: exr_converter-linux-x86_64
            ext: AppImage
          - os: macos-latest
            artifact: exr_converter-macos-arm64
            ext: dmg
          - os: macos-26-intel
            artifact: exr_converter-macos-x86_64
            ext: dmg
          - os: windows-latest
            artifact: exr_converter-windows-x86_64-setup
            ext: exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Nuitka and ccache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
            ~/AppData/Local/Nuitka
          key: nuitka-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: nuitka-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: uv sync

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^APP_VERSION = \"[^\"]*\"/APP_VERSION = \"${VERSION}\"/" src/core/constants.py
          rm -f src/core/constants.py.bak

      - name: Compile Qt resources
        run: uv run pyside6-rcc resources.qrc -o src/rc_resources.py

      - name: Determine platform icon
        id: icon
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            echo "path=resources/icons/icon.icns" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            echo "path=resources/icons/icon.ico" >> "$GITHUB_OUTPUT"
          else
            echo "path=resources/icons/icon.png" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Nuitka
        shell: bash
        run: |
          MODE="--standalone"
          EXTRA_FLAGS=()
          if [ "$RUNNER_OS" == "macOS" ]; then
            EXTRA_FLAGS+=(--macos-create-app-bundle "--macos-app-name=EXR Converter" "--macos-app-icon=${{ steps.icon.outputs.path }}")
            EXTRA_FLAGS+=("--macos-target-arch=${{ runner.arch == 'ARM64' && 'arm64' || 'x86_64' }}")
            EXTRA_FLAGS+=("--noinclude-dlls=libcrypto*" "--noinclude-dlls=libssl*")
          elif [ "$RUNNER_OS" == "Windows" ]; then
            EXTRA_FLAGS+=("--windows-icon-from-ico=${{ steps.icon.outputs.path }}" --windows-console-mode=disable)
          else
            EXTRA_FLAGS+=("--linux-icon=${{ steps.icon.outputs.path }}")
          fi
          uv run python -m nuitka \
            $MODE \
            --output-dir=dist \
            --output-filename=exr_converter \
            --assume-yes-for-downloads \
            --python-flag=-OO \
            --enable-plugin=pyside6 \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=unittest \
            --nofollow-import-to=pydoc \
            --nofollow-import-to=PIL \
            --nofollow-import-to='PySide6.QtWebEngine*' \
            --noinclude-qt-translations \
            --noinclude-qt-plugins=printsupport,mediaservice,iconengines \
            --noinclude-dlls='*Qt6WebEngine*' \
            --include-package-data=av \
            --include-package=OpenImageIO \
            --include-package-data=OpenImageIO \
            --include-package=PyOpenColorIO \
            --include-package-data=PyOpenColorIO \
            --include-package=fileseq \
            --quiet \
            "${EXTRA_FLAGS[@]}" \
            main.py

      - name: Rename macOS app bundle
        if: runner.os == 'macOS'
        run: mv dist/main.app "dist/EXR Converter.app"

      - name: Slim macOS bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP="dist/EXR Converter.app"
          ARCH="${{ runner.arch == 'ARM64' && 'arm64' || 'x86_64' }}"

          # Thin universal2 frameworks to single arch
          find "$APP" -type f \( -name '*.dylib' -o -name '*.so' \) -exec \
            sh -c 'lipo -info "$1" 2>/dev/null | grep -q "universal\|two arch" && lipo -thin '"$ARCH"' "$1" -output "$1.thin" && mv "$1.thin" "$1" || true' _ {} \;
          # Qt framework binaries (no .so/.dylib suffix) sit next to the PySide6
          # package, which Nuitka places under Contents/MacOS (not Resources).
          # Guard the path so a layout change can never fail the whole build.
          QT_LIB="$APP/Contents/MacOS/PySide6/Qt/lib"
          if [ -d "$QT_LIB" ]; then
            find "$QT_LIB" -type f ! -name '*.plist' ! -name '*.pri' -exec \
              sh -c 'lipo -info "$1" 2>/dev/null | grep -q "universal\|two arch" && lipo -thin '"$ARCH"' "$1" -output "$1.thin" && mv "$1.thin" "$1" || true' _ {} \;
          fi

          # Strip debug symbols
          find "$APP" -type f \( -name '*.dylib' -o -name '*.so' \) -exec strip -x {} +

          echo "Bundle size after slimming:"
          du -sh "$APP"

      - name: Slim Linux bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          DIST="dist/main.dist"
          find "$DIST" -type f \( -name '*.so' -o -name '*.so.*' -o -name 'exr_converter' \) -exec strip --strip-unneeded {} +
          echo "Bundle size after slimming:"
          du -sh "$DIST"

      - name: Slim Windows bundle
        if: runner.os == 'Windows'
        shell: bash
        run: |
          DIST="dist/main.dist"
          echo "Bundle size after slimming:"
          du -sh "$DIST"

      - name: Install EGL (Linux smoke-test dependency)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libegl1

      - name: List dist contents (debug)
        if: failure() || success()
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            find "dist/EXR Converter.app" -type f -name '*.dylib' -o -name '*.so' | sort
          else
            ls -la dist/main.dist/*.dll dist/main.dist/*.pyd dist/main.dist/*.so 2>/dev/null | sort || true
            echo "--- OpenImageIO dir ---"
            ls -la dist/main.dist/OpenImageIO/ 2>/dev/null || true
          fi

      - name: Smoke test
        shell: bash
        timeout-minutes: 1
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            "dist/EXR Converter.app/Contents/MacOS/exr_converter" --smoke-test
          elif [ "$RUNNER_OS" == "Windows" ]; then
            dist/main.dist/exr_converter.exe --smoke-test
          else
            dist/main.dist/exr_converter --smoke-test
          fi

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install create-dmg
          create-dmg \
            --volname "EXR Converter" \
            --volicon "resources/icons/icon.icns" \
            --format ULMO \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "EXR Converter.app" 150 190 \
            --hide-extension "EXR Converter.app" \
            --app-drop-link 450 190 \
            "${{ matrix.artifact }}.${{ matrix.ext }}" \
            "dist/EXR Converter.app"

      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPDIR="${{ matrix.artifact }}.AppDir"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp -a dist/main.dist/. "${APPDIR}/usr/bin/"
          chmod +x "${APPDIR}/usr/bin/exr_converter"
          cp resources/icons/icon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/exr_converter.png"
          cp resources/icons/icon.png "${APPDIR}/exr_converter.png"

          printf '[Desktop Entry]\nName=EXR Converter\nExec=exr_converter\nIcon=exr_converter\nType=Application\nCategories=Graphics;\n' \
            > "${APPDIR}/exr_converter.desktop"

          printf '#!/bin/bash\nSELF="$(readlink -f "$0")"\nHERE="$(dirname "$SELF")"\nexec "$HERE/usr/bin/exr_converter" "$@"\n' \
            > "${APPDIR}/AppRun"
          chmod +x "${APPDIR}/AppRun"

          curl -fSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 VERSION="${VERSION}" ./appimagetool \
            --no-appstream --comp zstd \
            "${APPDIR}" "${{ matrix.artifact }}.${{ matrix.ext }}"

      - name: Rename standalone folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item dist\main.dist exr_converter

      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("v","")
          iscc "/DAppVersion=$version" installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  # ── Cosign (Sigstore keyless) ─────────────────────────────────────────────
  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: sigstore/cosign-installer@v4.1.1

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Sign all artifacts with Cosign
        shell: bash
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] || continue
            echo "Signing $f ..."
            cosign sign-blob "$f" \
              --bundle "${f}.sigstore.json" \
              --yes
          done

      - uses: actions/upload-artifact@v6
        with:
          name: cosign-bundles
          path: artifacts/*.sigstore.json

  # ── SignPath Foundation (Windows Authenticode) ────────────────────────────
  # Free for qualifying open-source projects. Eliminates SmartScreen warnings.
  #
  # Prerequisites (one-time manual setup):
  #   1. Apply at https://signpath.org/ (requires OSI license, MFA, active maintenance)
  #   2. Install the SignPath GitHub App on this repo
  #   3. Create a signing policy + artifact configuration in SignPath dashboard
  #   4. Add secrets: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID
  #   5. Set variables: SIGNPATH_PROJECT_SLUG, SIGNPATH_SIGNING_POLICY_SLUG
  #
  # Uncomment the job below once onboarded:
  #
  # sign-windows:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/download-artifact@v7
  #       with:
  #         name: exr_converter-windows-x86_64
  #         path: unsigned
  #
  #     - name: Submit to SignPath
  #       uses: signpath/github-action-submit-signing-request@v1
  #       with:
  #         api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
  #         organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
  #         project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
  #         signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
  #         artifact-configuration-slug: exr_converter
  #         github-artifact-id: ${{ needs.build.outputs.windows-artifact-id }}
  #         wait-for-completion: true
  #         output-artifact-directory: signed
  #
  #     - uses: actions/upload-artifact@v6
  #       with:
  #         name: exr_converter-windows-x86_64-signed
  #         path: signed/

  release:
    needs: sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: "EXR Converter ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Verify artifact signatures

            All release artifacts are signed with [Sigstore Cosign](https://docs.sigstore.dev/) (keyless).
            Each artifact has a matching `.sigstore.json` bundle that proves it was built by this repository's GitHub Actions workflow.

            ```bash
            # Install cosign: https://docs.sigstore.dev/cosign/system_config/installation/
            cosign verify-blob <ARTIFACT_FILE> \
              --bundle <ARTIFACT_FILE>.sigstore.json \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "github.com/derek-rein/vfx-tools"
            ```

            ### macOS note
            These builds use an ad-hoc code signature. On first launch, right-click the app and select **Open**, or run:
            ```bash
            xattr -cr "/Applications/EXR Converter.app"
            ```
