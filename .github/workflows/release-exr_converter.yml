# Independent versioning: tag format exr_converter/v1.2.3 (not a global v1.2.3).
# Push: git tag exr_converter/v1.2.3 && git push origin exr_converter/v1.2.3

name: Release exr_converter

on:
  push:
    tags:
      - "exr_converter/v*"

permissions:
  contents: write

env:
  NUITKA_ASSUME_YES_FOR_DOWNLOADS: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: exr_converter-linux-x86_64
            ext: AppImage
          - os: macos-latest
            artifact: exr_converter-macos-arm64
            ext: dmg
          - os: macos-13
            artifact: exr_converter-macos-x86_64
            ext: dmg
          - os: windows-latest
            artifact: exr_converter-windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/exr_converter

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Nuitka and ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
            ~/AppData/Local/Nuitka
          key: nuitka-exr-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/exr_converter/pyproject.toml') }}
          restore-keys: nuitka-exr-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: uv sync

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#exr_converter/v}"
          sed -i.bak "s/^APP_VERSION = \"[^\"]*\"/APP_VERSION = \"${VERSION}\"/" src/constants.py
          rm -f src/constants.py.bak

      - name: Compile Qt resources
        run: uv run pyside6-rcc resources.qrc -o src/rc_resources.py

      - name: Determine platform icon
        id: icon
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            echo "path=public/icon.icns" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            echo "path=public/icon.ico" >> "$GITHUB_OUTPUT"
          else
            echo "path=public/icon.png" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Nuitka
        shell: bash
        run: |
          MODE="--onefile"
          EXTRA_FLAGS=""
          if [ "$RUNNER_OS" == "macOS" ]; then
            MODE="--standalone"
            EXTRA_FLAGS="--macos-create-app-bundle --macos-app-name=EXR\ Converter --macos-app-icon=${{ steps.icon.outputs.path }}"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            EXTRA_FLAGS="--windows-icon-from-ico=${{ steps.icon.outputs.path }} --windows-console-mode=disable"
          else
            EXTRA_FLAGS="--linux-icon=${{ steps.icon.outputs.path }}"
          fi
          uv run python -m nuitka \
            $MODE \
            --output-dir=dist \
            --output-filename=exr_converter \
            --assume-yes-for-downloads \
            --python-flag=-OO \
            --enable-plugin=pyside6 \
            --enable-plugin=anti-bloat \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=unittest \
            --nofollow-import-to=pydoc \
            --include-package-data=av \
            --include-package=OpenImageIO \
            --include-package-data=OpenImageIO \
            --include-package=PyOpenColorIO \
            --include-package-data=PyOpenColorIO \
            --include-package=fileseq \
            --quiet \
            $EXTRA_FLAGS \
            main.py

      - name: Rename macOS app bundle
        if: runner.os == 'macOS'
        run: mv dist/main.app dist/exr_converter.app

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install create-dmg
          create-dmg \
            --volname "EXR Converter" \
            --volicon "public/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "exr_converter.app" 150 190 \
            --hide-extension "exr_converter.app" \
            --app-drop-link 450 190 \
            "${{ matrix.artifact }}.${{ matrix.ext }}" \
            dist/exr_converter.app

      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#exr_converter/v}"
          APPDIR="${{ matrix.artifact }}.AppDir"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp dist/exr_converter "${APPDIR}/usr/bin/exr_converter"
          chmod +x "${APPDIR}/usr/bin/exr_converter"
          cp public/icon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/exr_converter.png"
          cp public/icon.png "${APPDIR}/exr_converter.png"

          printf '[Desktop Entry]\nName=EXR Converter\nExec=exr_converter\nIcon=exr_converter\nType=Application\nCategories=Graphics;\n' \
            > "${APPDIR}/exr_converter.desktop"

          printf '#!/bin/bash\nSELF="$(readlink -f "$0")"\nHERE="$(dirname "$SELF")"\nexec "$HERE/usr/bin/exr_converter" "$@"\n' \
            > "${APPDIR}/AppRun"
          chmod +x "${APPDIR}/AppRun"

          curl -fSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 VERSION="${VERSION}" ./appimagetool --no-appstream "${APPDIR}" \
            "${{ matrix.artifact }}.${{ matrix.ext }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg\exr_converter | Out-Null
          Copy-Item dist\exr_converter.exe pkg\exr_converter\exr_converter.exe
          Compress-Archive -Path pkg\exr_converter -DestinationPath ${{ matrix.artifact }}.${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: apps/exr_converter/${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "exr_converter ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/*
