# Independent versioning: tag format slate_maker/v0.4.0
# Push: git tag slate_maker/v0.4.0 && git push origin slate_maker/v0.4.0

name: Release slate_maker

on:
  push:
    tags:
      - "slate_maker/v*"

permissions:
  contents: write
  id-token: write

env:
  NUITKA_ASSUME_YES_FOR_DOWNLOADS: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: slate_maker-linux-x86_64
            ext: AppImage
          - os: macos-latest
            artifact: slate_maker-macos-arm64
            ext: dmg
          - os: macos-26-intel
            artifact: slate_maker-macos-x86_64
            ext: dmg
          - os: windows-latest
            artifact: slate_maker-windows-x86_64-setup
            ext: exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/slate_maker

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache Nuitka and ccache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
            ~/AppData/Local/Nuitka
          key: nuitka-slate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/slate_maker/pyproject.toml') }}
          restore-keys: nuitka-slate-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: uv sync

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#slate_maker/v}"
          sed -i.bak "s/^APP_VERSION = \"[^\"]*\"/APP_VERSION = \"${VERSION}\"/" src/constants.py
          rm -f src/constants.py.bak

      - name: Compile Qt resources
        run: uv run pyside6-rcc resources.qrc -o src/rc_resources.py

      - name: Determine platform icon
        id: icon
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            echo "path=public/icon.icns" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            echo "path=public/icon.ico" >> "$GITHUB_OUTPUT"
          else
            echo "path=public/icon.png" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Nuitka
        shell: bash
        run: |
          MODE="--onefile"
          EXTRA_FLAGS=()
          if [ "$RUNNER_OS" == "macOS" ]; then
            MODE="--standalone"
            EXTRA_FLAGS+=(--macos-create-app-bundle "--macos-app-name=Slate Maker" "--macos-app-icon=${{ steps.icon.outputs.path }}")
          elif [ "$RUNNER_OS" == "Windows" ]; then
            MODE="--standalone"
            EXTRA_FLAGS+=("--windows-icon-from-ico=${{ steps.icon.outputs.path }}" --windows-console-mode=disable)
          else
            EXTRA_FLAGS+=("--linux-icon=${{ steps.icon.outputs.path }}")
          fi
          uv run python -m nuitka \
            $MODE \
            --output-dir=dist \
            --output-filename=slate_maker \
            --assume-yes-for-downloads \
            --python-flag=-OO \
            --enable-plugin=pyside6 \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=unittest \
            --nofollow-import-to=pydoc \
            --include-package=OpenImageIO \
            --include-package-data=OpenImageIO \
            --include-package=PyOpenColorIO \
            --include-package-data=PyOpenColorIO \
            --include-data-dir=templates=templates \
            --include-data-files=style.qss=style.qss \
            --noinclude-dlls='libcrypto*' \
            --noinclude-dlls='libssl*' \
            --quiet \
            "${EXTRA_FLAGS[@]}" \
            main.py

      - name: Rename macOS app bundle
        if: runner.os == 'macOS'
        run: mv dist/main.app dist/slate_maker.app

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Slate Maker" \
            --volicon "public/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "slate_maker.app" 150 190 \
            --hide-extension "slate_maker.app" \
            --app-drop-link 450 190 \
            "${{ matrix.artifact }}.${{ matrix.ext }}" \
            dist/slate_maker.app

      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#slate_maker/v}"
          APPDIR="${{ matrix.artifact }}.AppDir"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp dist/slate_maker "${APPDIR}/usr/bin/slate_maker"
          chmod +x "${APPDIR}/usr/bin/slate_maker"
          cp public/icon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/slate_maker.png"
          cp public/icon.png "${APPDIR}/slate_maker.png"

          printf '[Desktop Entry]\nName=Slate Maker\nExec=slate_maker\nIcon=slate_maker\nType=Application\nCategories=Graphics;\n' \
            > "${APPDIR}/slate_maker.desktop"

          printf '#!/bin/bash\nSELF="$(readlink -f "$0")"\nHERE="$(dirname "$SELF")"\nexec "$HERE/usr/bin/slate_maker" "$@"\n' \
            > "${APPDIR}/AppRun"
          chmod +x "${APPDIR}/AppRun"

          curl -fSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 VERSION="${VERSION}" ./appimagetool --no-appstream "${APPDIR}" \
            "${{ matrix.artifact }}.${{ matrix.ext }}"

      - name: Rename standalone folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item dist\main.dist slate_maker

      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("slate_maker/v","")
          iscc "/DAppVersion=$version" installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: apps/slate_maker/${{ matrix.artifact }}.${{ matrix.ext }}

  # ── Cosign (Sigstore keyless) ─────────────────────────────────────────────
  # Proves each artifact was built by this GitHub Actions workflow.
  # Users verify with: cosign verify-blob --bundle <file>.sigstore.json <file>
  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: sigstore/cosign-installer@v4

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Sign all artifacts with Cosign
        shell: bash
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] || continue
            echo "Signing $f ..."
            cosign sign-blob "$f" \
              --bundle "${f}.sigstore.json" \
              --yes
          done

      - uses: actions/upload-artifact@v6
        with:
          name: cosign-bundles
          path: artifacts/*.sigstore.json

  # ── SignPath Foundation (Windows Authenticode) ────────────────────────────
  # Free for qualifying open-source projects. Eliminates SmartScreen warnings.
  #
  # Prerequisites (one-time manual setup):
  #   1. Apply at https://signpath.org/ (requires OSI license, MFA, active maintenance)
  #   2. Install the SignPath GitHub App on this repo
  #   3. Create a signing policy + artifact configuration in SignPath dashboard
  #   4. Add secrets: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID
  #   5. Set variables: SIGNPATH_PROJECT_SLUG, SIGNPATH_SIGNING_POLICY_SLUG
  #
  # Uncomment the job below once onboarded:
  #
  # sign-windows:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/download-artifact@v7
  #       with:
  #         name: slate_maker-windows-x86_64
  #         path: unsigned
  #
  #     - name: Submit to SignPath
  #       uses: signpath/github-action-submit-signing-request@v1
  #       with:
  #         api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
  #         organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
  #         project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
  #         signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
  #         artifact-configuration-slug: slate_maker
  #         github-artifact-id: ${{ needs.build.outputs.windows-artifact-id }}
  #         wait-for-completion: true
  #         output-artifact-directory: signed
  #
  #     - uses: actions/upload-artifact@v6
  #       with:
  #         name: slate_maker-windows-x86_64-signed
  #         path: signed/

  release:
    needs: sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "slate_maker ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Verify artifact signatures

            All release artifacts are signed with [Sigstore Cosign](https://docs.sigstore.dev/) (keyless).
            Each artifact has a matching `.sigstore.json` bundle that proves it was built by this repository's GitHub Actions workflow.

            ```bash
            # Install cosign: https://docs.sigstore.dev/cosign/system_config/installation/
            cosign verify-blob <ARTIFACT_FILE> \
              --bundle <ARTIFACT_FILE>.sigstore.json \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "github.com/derek-rein/vfx-tools"
            ```

            ### macOS note
            These builds use an ad-hoc code signature. On first launch, right-click the app and select **Open**, or run:
            ```bash
            xattr -cr /Applications/slate_maker.app
            ```
