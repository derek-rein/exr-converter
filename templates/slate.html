<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="qrc:///qtwebchannel/qwebchannel.js" onerror=""></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/*
 * CSS Color Level 4 — wide-gamut film slate.
 *
 * Neutrals use oklch() for perceptually uniform grays.
 * Accents use color(rec2020 ...) for maximum gamut.
 * Color bars are full rec2020 primaries — SMPTE-grade.
 *
 * Viewport units only — proportions are resolution-independent.
 * Calibrated to the Netflix Nuke template at 4K (4096×2160).
 * vh values = (nuke_px / 2160) × 100.
 */

:root {
  color-scheme: dark;

  /* ── Neutrals (oklch perceptually uniform, zero chroma) ── */
  --bg:          oklch(20% 0 0);   /* pure neutral charcoal */
  --bg-deep:     oklch(14% 0 0);   /* thumbnail/inset background */
  --text:        oklch(90% 0 0);   /* primary text */
  --text-bright: oklch(98% 0 0);   /* headings, values */
  --text-mid:    oklch(80% 0 0);   /* secondary values */
  --text-dim:    oklch(58% 0 0);   /* labels, metadata keys */
  --text-muted:  oklch(40% 0 0);   /* separators, subtle text */
  --border:      oklch(32% 0 0);   /* hairline borders */
  --border-faint: oklch(24% 0 0);  /* table row dividers */

  /* ── Accents (rec2020 wide gamut) ── */
  --accent-red:  color(rec2020 0.72 0.12 0.09);  /* divider — vivid film red */

  /* ── SMPTE color bars (rec2020 primaries) ── */
  --bar-white:   color(rec2020 0.75 0.75 0.75);
  --bar-yellow:  color(rec2020 0.75 0.75 0);
  --bar-cyan:    color(rec2020 0 0.75 0.75);
  --bar-green:   color(rec2020 0 0.75 0);
  --bar-magenta: color(rec2020 0.75 0 0.75);
  --bar-red:     color(rec2020 0.75 0 0);
  --bar-blue:    color(rec2020 0 0 0.75);
  --bar-black:   color(rec2020 0 0 0);
  --bar-full-white: color(rec2020 1 1 1);

  /* PLUGE patches */
  --pluge-sub:   oklch(2% 0 0);   /* super-black (-4 IRE) */
  --pluge-ref:   oklch(5.5% 0 0); /* reference black (0 IRE) */
  --pluge-over:  oklch(9% 0 0);   /* near-black (+4 IRE) */
}

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  font-family: "Helvetica Neue", Arial, sans-serif;
  color: var(--text);
}

#slate {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  padding: 2.5vh 2vw;
}

.slate-body {
  flex: 1;
  display: flex;
  gap: 0;
  min-height: 0;
}

.left-col {
  flex: 1;
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 0.6vw;
  row-gap: 0.3vh;
  align-content: start;
  min-width: 0;
  padding-right: 1.5vw;
}

.identity-bar {
  grid-column: 1 / -1;
  display: flex;
  align-items: baseline;
  gap: 1.2vw;
  padding-bottom: 0.8vh;
}
.id-cell { display: flex; align-items: baseline; gap: 0.3vw; }
.id-label { font-size: 1.9vh; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.id-value { font-size: 3.8vh; font-weight: 700; color: var(--text-bright); }
.id-sep { font-size: 3vh; color: var(--text-muted); }

.header-row {
  grid-column: 1 / -1;
  display: flex;
  align-items: baseline;
  gap: 0.4vw;
  padding-bottom: 0.8vh;
}
.header-row .submit-label { font-size: 2.2vh; color: var(--text-dim); }
.header-row .submit-value { font-size: 5.5vh; font-weight: 800; color: var(--text-bright); letter-spacing: 0.02em; }

.red-divider {
  height: 0.3vh;
  background: var(--accent-red);
  margin-bottom: 1.2vh;
}

.field-row {
  display: contents;
}
.field-label {
  text-align: right;
  justify-self: end;
  align-self: baseline;
  font-size: 2.1vh;
  color: var(--text-dim);
  line-height: 1.4;
  padding: 0.3vh 0;
}
.field-value {
  justify-self: start;
  align-self: baseline;
  font-size: 3.2vh;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  padding: 0.3vh 0;
}
.field-value.large {
  font-size: 4vh;
  font-weight: 700;
}
.field-value.body {
  font-size: 2.7vh;
  font-weight: 400;
  color: var(--text-mid);
  line-height: 1.4;
}

.right-col {
  width: 30vw;
  display: flex;
  flex-direction: column;
  gap: 0;
  flex-shrink: 0;
}

.thumbnail {
  width: 30vw;
  height: 16.875vw;
  background: var(--bg-deep);
  border: 0.05vh solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 2.1vh;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  overflow: hidden;
}
.thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ── SMPTE colour-bar assembly (3 rows) ── */
.smpte-bars {
  width: 30vw;
  display: flex;
  flex-direction: column;
}

/* Row 1 — main 75% bars */
.bars-main {
  display: flex;
  height: 2.6vh;
}
.bars-main div { flex: 1; }

/* Row 2 — castellation / reverse strip */
.bars-cast {
  display: flex;
  height: 0.8vh;
}
.bars-cast div { flex: 1; }

/* Row 3 — PLUGE + gradient ramp */
.bars-bottom {
  display: flex;
  height: 1.4vh;
}
.bars-bottom .pluge     { flex: 1; display: flex; }
.bars-bottom .pluge div { flex: 1; }
.bars-bottom .gradient  { flex: 5; }
.bars-bottom .ref-white { flex: 1; }

.right-fields {
  width: 30vw;
  border-collapse: collapse;
}
.right-fields tr:nth-child(odd)  { background: oklch(18% 0 0); }
.right-fields tr:nth-child(even) { background: oklch(21% 0 0); }
.right-fields td {
  padding: 0.5vh 0.4vw;
  font-size: 2.1vh;
  line-height: 1.4;
  border-bottom: 0.05vh solid var(--border-faint);
}
.right-fields .rl {
  color: var(--text-dim);
  text-align: left;
  white-space: nowrap;
  font-weight: 500;
}
.right-fields .rv {
  color: var(--text);
  text-align: right;
  font-weight: 600;
}

.vendor-logo {
  margin-top: auto;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding-top: 0.8vh;
}
.vendor-logo-box {
  border: 0.05vh solid var(--border);
  padding: 1vh 0.8vw;
  font-size: 2.8vh;
  font-weight: 700;
  font-style: italic;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div id="slate">
  <!-- ════ TOP IDENTITY BAR: Show · Seq · Shot · Version ════ -->
  <div class="identity-bar">
    <div class="id-cell">
      <span class="id-label">Show</span>
      <span class="id-value" id="show-field">SHOW</span>
    </div>
    <div class="id-sep">·</div>
    <div class="id-cell">
      <span class="id-label">Seq</span>
      <span class="id-value" id="sequence-field">SEQ</span>
    </div>
    <div class="id-sep">·</div>
    <div class="id-cell">
      <span class="id-label">Shot</span>
      <span class="id-value" id="shot-field">SHOT</span>
    </div>
    <div class="id-sep">·</div>
    <div class="id-cell">
      <span class="id-label">Version</span>
      <span class="id-value" id="version-field">v001</span>
    </div>
  </div>

  <div class="red-divider"></div>

  <div class="slate-body">

    <!-- ════ LEFT COLUMN ════ -->
    <div class="left-col">

      <div class="header-row">
        <span class="submit-label">Submitting For:</span>
        <span class="submit-value" id="submit-for-field">WIP</span>
      </div>

      <div class="field-row" id="notes-row" style="display:none;">
        <div class="field-label">Submission<br>Note:</div>
        <div class="field-value body" id="notes"></div>
      </div>

      <div class="field-row">
        <div class="field-label">Date:</div>
        <div class="field-value" id="date-display">2026-04-05</div>
      </div>

      <div class="field-row" id="shot-types-row" style="display:none;">
        <div class="field-label">Shot Types:</div>
        <div class="field-value" id="shot-types-field"></div>
      </div>

      <div class="field-row" id="description-row" style="display:none;">
        <div class="field-label">Shot<br>Description:</div>
        <div class="field-value body" id="description-field"></div>
      </div>

      <div class="field-row" id="scope-row" style="display:none;">
        <div class="field-label">VFX Scope Of<br>Work:</div>
        <div class="field-value body" id="scope-field"></div>
      </div>

    </div>

    <!-- ════ RIGHT COLUMN ════ -->
    <div class="right-col">

      <div class="thumbnail" id="thumbnail-area">Thumbnail</div>

      <!-- SMPTE colour bars (3-section) -->
      <div class="smpte-bars">
        <!-- Row 1: main bars — W Y C G M R B -->
        <div class="bars-main">
          <div style="background:var(--bar-white);"></div>
          <div style="background:var(--bar-yellow);"></div>
          <div style="background:var(--bar-cyan);"></div>
          <div style="background:var(--bar-green);"></div>
          <div style="background:var(--bar-magenta);"></div>
          <div style="background:var(--bar-red);"></div>
          <div style="background:var(--bar-blue);"></div>
        </div>
        <!-- Row 2: castellations (reverse) — B Bk M Bk C Bk W -->
        <div class="bars-cast">
          <div style="background:var(--bar-blue);"></div>
          <div style="background:var(--bar-black);"></div>
          <div style="background:var(--bar-magenta);"></div>
          <div style="background:var(--bar-black);"></div>
          <div style="background:var(--bar-cyan);"></div>
          <div style="background:var(--bar-black);"></div>
          <div style="background:var(--bar-white);"></div>
        </div>
        <!-- Row 3: PLUGE + gradient ramp + ref white -->
        <div class="bars-bottom">
          <div class="pluge">
            <div style="background:var(--pluge-sub);"></div>
            <div style="background:var(--pluge-ref);"></div>
            <div style="background:var(--pluge-over);"></div>
          </div>
          <div class="gradient" style="background:linear-gradient(to right, var(--bar-black), var(--bar-full-white));"></div>
          <div class="ref-white" style="background:var(--bar-full-white);"></div>
        </div>
      </div>

      <table class="right-fields">
        <tr id="vendor-row"><td class="rl">Vendor:</td><td class="rv" id="vendor-field">—</td></tr>
        <tr><td class="rl">Artist:</td><td class="rv" id="artist-field">—</td></tr>
        <tr id="take-row" style="display:none;"><td class="rl">Take:</td><td class="rv" id="take-display"></td></tr>
        <tr><td class="rl">Frames:</td><td class="rv" id="frame-range">1001 – 1100 (100)</td></tr>
        <tr><td class="rl">FPS:</td><td class="rv" id="fps-field">24</td></tr>
        <tr><td class="rl">Resolution:</td><td class="rv" id="resolution-field">1920×1080</td></tr>
        <tr><td class="rl">Media Color:</td><td class="rv" id="colorspace">sRGB</td></tr>
      </table>

      <div class="vendor-logo" id="logo-row" style="display:none;">
        <div class="vendor-logo-box" id="logo-text"></div>
      </div>

    </div>
  </div>
</div>

<script>
let pyBridge = null;
if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
  new QWebChannel(qt.webChannelTransport, function(channel) {
    pyBridge = channel.objects.bridge;
    if (pyBridge) pyBridge.ready.connect(function() {});
  });
}

function updateSlate(data) {
  const set = (id, val) => {
    const el = document.getElementById(id);
    if (el && val !== undefined && val !== null) el.textContent = val;
  };

  set('show-field',       data.show);
  set('sequence-field',   data.sequence);
  set('shot-field',       data.shot);
  set('version-field',    data.version);
  set('submit-for-field', data.submitFor);
  set('date-display',     data.date);
  set('artist-field',     data.artist);
  set('frame-range',      data.frameRange);
  set('fps-field',        data.fps);
  set('resolution-field', data.resolution);
  set('colorspace',       data.colorspace);

  const toggle = (rowId, fieldId, val) => {
    const row = document.getElementById(rowId);
    const el  = document.getElementById(fieldId);
    if (!row) return;
    if (val) {
      if (el) el.textContent = val;
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  };

  toggle('vendor-row',     'vendor-field',      data.vendor);
  toggle('take-row',       'take-display',      data.take);
  toggle('shot-types-row', 'shot-types-field',  data.shotTypes);
  toggle('scope-row',      'scope-field',       data.scope);
  toggle('description-row','description-field',  data.description);
  toggle('notes-row',      'notes',             data.notes);
  toggle('logo-row',       'logo-text',         data.logo);
}

function setThumbnail(b64) {
  const el = document.getElementById('thumbnail-area');
  if (!el || !b64) return;
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'image/jpeg' });
  const url = URL.createObjectURL(blob);
  el.innerHTML = '<img src="' + url + '" alt="Thumbnail">';
}

// Auto-populate with sample data when opened standalone
if (typeof QWebChannel === 'undefined') {
  updateSlate({
    show: 'NFLX',
    sequence: '101',
    shot: '001_0020',
    submitFor: 'SAMPLE',
    version: 'v001',
    date: '2021-05-11',
    shotTypes: '2d comp',
    description: 'If a description field is required, it goes on the left to provide more space.',
    scope: 'Demo a sample slate.',
    notes: 'Submitting as an example with all template fields filled out.',
    vendor: 'Template Team',
    artist: 'Jane Doe',
    take: '001',
    fps: '24',
    resolution: '4096×2160',
    frameRange: '1000 - 1030 (30)',
    colorspace: 'rec709 with show lut',
    logo: 'Vendor Logo',
  });
}
</script>
</body>
</html>
