<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: transparent;
  font-family: "Menlo", "Consolas", "DejaVu Sans Mono", "Liberation Mono", monospace;
}

#overlay {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto 1fr auto;
  padding: 0;
}

.cell {
  display: flex;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.top-left     { grid-area: 1 / 1; justify-content: start; align-items: start; }
.top-center   { grid-area: 1 / 2; justify-content: center; align-items: start; }
.top-right    { grid-area: 1 / 3; justify-content: end; align-items: start; }
.bottom-left   { grid-area: 3 / 1; justify-content: start; align-items: end; }
.bottom-center { grid-area: 3 / 2; justify-content: center; align-items: end; }
.bottom-right  { grid-area: 3 / 3; justify-content: end; align-items: end; }

.text {
  font-size: 2.5vh;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: rgba(210, 210, 210, 0.9);
  background: rgba(0, 0, 0, 0.5);
  padding: 0.3vh 0.5vw;
}

.text:empty {
  display: none;
}
</style>
</head>
<body>
<div id="overlay">
  <div class="cell top-left"><span class="text" id="top_left"></span></div>
  <div class="cell top-center"><span class="text" id="top_center"></span></div>
  <div class="cell top-right"><span class="text" id="top_right"></span></div>
  <div class="cell bottom-left"><span class="text" id="bottom_left"></span></div>
  <div class="cell bottom-center"><span class="text" id="bottom_center"></span></div>
  <div class="cell bottom-right"><span class="text" id="bottom_right"></span></div>
</div>

<script>
function updateBurnin(data) {
  var ids = ['top_left','top_center','top_right',
             'bottom_left','bottom_center','bottom_right'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) el.textContent = data[ids[i]] || '';
  }
}
</script>
</body>
</html>
